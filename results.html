<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Matches</title>
  <script type="module" crossorigin src="/movie-matchmaker/results.js"></script>
  <link rel="modulepreload" crossorigin href="/movie-matchmaker/assets/vendor-CO_RJdZs.js">
  <link rel="modulepreload" crossorigin href="/movie-matchmaker/assets/lenis-XpNqXJJs.js">
  <link rel="modulepreload" crossorigin href="/movie-matchmaker/assets/storage-D_nSxz11.js">
  <link rel="stylesheet" crossorigin href="/movie-matchmaker/assets/vendor-BR-JQ1hv.css">
  <link rel="stylesheet" crossorigin href="/movie-matchmaker/assets/lenis-CLPtRTAD.css">
</head>
<body>
  <div id="app">
    <main class="results-page">
      
      <section class="results-header">
  <div class="results-header__top">
    <div class="results-header__text">
      <p class="hero-badge">Your movie picks</p>
      <h1>Your matches</h1>
      <p class="results-subtitle">
        Here are the best movies for both of you.
      </p>
    </div>

    <div class="results-header__actions">
      <button id="home-btn" class="secondary-btn" type="button">
        ← Home
      </button>

      <button id="restart-btn" class="primary-btn" type="button">
        Try again
      </button>
    </div>
  </div>
</section>

<p id="fallback-message" class="fallback-message hidden">
  We couldn't find perfect matches — here are popular picks 🎬
</p>

     <section class="best-match-section">
  <h2>Best Match</h2>
  <div id="best-match"></div>
</section>

<section class="results-content">
  <h2>More Matches</h2>
  <div id="results"></div>

  <div class="load-more-wrap">
    <button id="load-more-btn" class="secondary-btn" type="button">
      Load more
    </button>
  </div>
</section>

    </main>
  </div>

  <div id="movie-modal" class="movie-modal hidden">
    <div class="movie-modal__overlay"></div>

    <div class="movie-modal__content">
      <button id="modal-close-btn" class="modal-close-btn" type="button">✕</button>
      <div id="modal-body"></div>
    </div>
  </div>

</body>
</html>
