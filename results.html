<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Matches</title>
  <script type="module" crossorigin src="/movie-matchmaker/results.js"></script>
  <link rel="modulepreload" crossorigin href="/movie-matchmaker/assets/styles-B2NxqJIg.js">
  <link rel="modulepreload" crossorigin href="/movie-matchmaker/assets/storage-D_nSxz11.js">
  <link rel="stylesheet" crossorigin href="/movie-matchmaker/assets/styles-DTo7E10c.css">
</head>
<body>
  <div id="app">
    <main class="results-page">
      <section class="results-header">
        <div class="results-header__text">
          <p class="hero-badge">Your movie picks</p>
          <h1>Your matches</h1>
          <p>Here are the best movies for both of you.</p>
        </div>

        <button id="restart-btn" class="primary-btn" type="button">
          Try again
        </button>
      </section>

      <section class="results-content">
        <div id="results"></div>
      </section>
    </main>
  </div>

  <div id="movie-modal" class="movie-modal hidden">
    <div class="movie-modal__overlay"></div>

    <div class="movie-modal__content">
      <button id="modal-close-btn" class="modal-close-btn" type="button">✕</button>
      <div id="modal-body"></div>
    </div>
  </div>

</body>
</html>
