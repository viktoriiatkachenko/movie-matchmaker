<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Choose Preferences</title>
  <script type="module" crossorigin src="/movie-matchmaker/match.js"></script>
  <link rel="modulepreload" crossorigin href="/movie-matchmaker/assets/styles-CCtAtZr1.js">
  <link rel="modulepreload" crossorigin href="/movie-matchmaker/assets/storage-D_nSxz11.js">
  <link rel="stylesheet" crossorigin href="/movie-matchmaker/assets/styles-Da2IHJrv.css">
</head>
<body>
  <div id="app">
    <main class="match-page">
      <section class="match-header">
        <p class="hero-badge">Choose your vibe</p>
        <h1>Choose your preferences</h1>
        <p>Tell us what both of you like and we’ll find the best options.</p>
      </section>

      <section class="match-content">
        <div class="users-container">
          <div class="user-card">
            <h3>Person 1</h3>

            <input type="text" placeholder="Your name" />

            <p>Favorite genres</p>
            <div class="genres" data-type="favorite"></div>

            <p>Avoid genres</p>
            <div class="genres" data-type="avoid"></div>

            <p>Mood</p>
            <div class="moods"></div>
          </div>

          <div class="user-card">
            <h3>Person 2</h3>

            <input type="text" placeholder="Your name" />

            <p>Favorite genres</p>
            <div class="genres" data-type="favorite"></div>

            <p>Avoid genres</p>
            <div class="genres" data-type="avoid"></div>

            <p>Mood</p>
            <div class="moods"></div>
          </div>
        </div>

        <div class="match-actions">
          <button id="match-btn" class="primary-btn" type="button">
            Find our movie
          </button>
        </div>
      </section>
    </main>
  </div>

</body>
</html>
